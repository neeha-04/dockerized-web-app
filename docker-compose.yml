services:
  web:
    build: .
    container_name: flask_app
    restart: always
    env_file: .env
    expose:
      - "5000"
    logging:
      driver: "none"
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web
    logging:
      driver: "none"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge